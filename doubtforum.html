<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doubt Forum</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f7;
            margin: 0;
        }
        
        header {
            background: #2c7be5;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }
        
        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }
        
        .section {
            flex: 1;
        }
        
        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }
        
        textarea,
        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        
        button {
            background: #2c7be5;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
        }
        
        button:hover {
            background: #1a5dc9;
        }
        
        .question {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        
        .answer {
            background: #f1f7ff;
            padding: 8px;
            border-radius: 6px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <header>🎓 Doubt Forum System</header>

    <div class="container">

        <!-- Student Section -->
        <div class="section">
            <div class="card">
                <h3>📘 Student: Ask Question</h3>
                <input type="text" id="studentName" placeholder="Your Name">
                <textarea id="studentQuestion" placeholder="Enter your doubt..."></textarea>
                <button onclick="addQuestion()">Submit Question</button>
            </div>
        </div>

        <!-- Answer Section -->
        <div class="section">
            <div class="card">
                <h3>🧑‍🏫 Answer Section</h3>
                <div id="questionList"></div>
            </div>
        </div>

    </div>

    <script>
        let questions = [];

        function addQuestion() {
            const name = document.getElementById('studentName').value;
            const question = document.getElementById('studentQuestion').value;

            if (!name || !question) {
                alert('Fill all fields');
                return;
            }

            questions.push({
                name,
                question,
                answers: []
            });

            document.getElementById('studentQuestion').value = '';
            renderQuestions();
        }

        function addAnswer(index) {
            const input = document.getElementById('answer-' + index);
            const text = input.value;

            if (!text) {
                alert('Enter answer');
                return;
            }

            questions[index].answers.push(text);
            input.value = '';
            renderQuestions();
        }

        function renderQuestions() {
            const list = document.getElementById('questionList');
            list.innerHTML = '';

            questions.forEach((q, i) => {
                        const div = document.createElement('div');
                        div.className = 'question';

                        div.innerHTML = `
      <strong>${q.name}</strong>
      <p>${q.question}</p>

      <input id="answer-${i}" placeholder="Write answer...">
      <button onclick="addAnswer(${i})">Answer</button>

      ${q.answers.map(a => `<div class="answer">${a}</div>`).join('')}
    `;

    list.appendChild(div);
  });
}
    </script>

</body>

</html>
