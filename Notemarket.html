<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>NoteMarket</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f8;
        }
        
        header {
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }
        
        .container {
            padding: 20px;
        }
        
        .upload-section {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        .notes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        
        .note-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 12px;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 5px;
        }
        
        button:hover {
            background: #007bff;
        }
    </style>
</head>

<body>

    <header>📚 NoteMarket</header>

    <div class="container">

        <div class="upload-section">
            <h3>Upload Notes</h3>
            <input type="text" id="title" placeholder="Enter note title"><br><br>
            <input type="file" id="fileInput"><br><br>
            <button onclick="uploadNote()">Upload</button>
        </div>

        <div class="notes" id="notesContainer"></div>

    </div>

    <script>
        let notes = [];

        function uploadNote() {
            const title = document.getElementById('title').value;
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];

            if (!title || !file) {
                alert('Please enter title and select file');
                return;
            }

            const note = {
                title: title,
                file: file,
                url: URL.createObjectURL(file)
            };

            notes.push(note);
            displayNotes();

            document.getElementById('title').value = '';
            fileInput.value = '';
        }

        function displayNotes() {
            const container = document.getElementById('notesContainer');
            container.innerHTML = '';

            notes.forEach((note, index) => {
                const div = document.createElement('div');
                div.className = 'note-card';

                div.innerHTML = `
        <h4>${note.title}</h4>
        <button onclick="downloadNote(${index})">Download</button>
        <button onclick="deleteNote(${index})" style="background:red;">Delete</button>
      `;

                container.appendChild(div);
            });
        }

        function downloadNote(index) {
            const note = notes[index];
            const a = document.createElement('a');
            a.href = note.url;
            a.download = note.file.name;
            a.click();
        }

        function deleteNote(index) {
            notes.splice(index, 1);
            displayNotes();
        }
    </script>

</body>

</html>
